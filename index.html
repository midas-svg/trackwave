<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TrackWave — Localisation</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#080b14;color:#e8eaf6;font-family:'Syne',sans-serif;min-height:100vh;overflow-x:hidden}
:root{
  --neon:#7c6ef7;
  --neon2:#f06292;
  --neon3:#4dd0e1;
  --card-bg:rgba(255,255,255,0.04);
  --card-border:rgba(124,110,247,0.2);
}

/* Orbs de fond */
.bg-orbs{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:0.18}
.orb1{width:500px;height:500px;background:#7c6ef7;top:-100px;left:-150px;animation:drift1 12s ease-in-out infinite}
.orb2{width:400px;height:400px;background:#f06292;bottom:-80px;right:-100px;animation:drift2 15s ease-in-out infinite}
.orb3{width:300px;height:300px;background:#4dd0e1;top:40%;left:60%;animation:drift3 10s ease-in-out infinite}
@keyframes drift1{0%,100%{transform:translate(0,0)}50%{transform:translate(40px,30px)}}
@keyframes drift2{0%,100%{transform:translate(0,0)}50%{transform:translate(-30px,-40px)}}
@keyframes drift3{0%,100%{transform:translate(0,0)}50%{transform:translate(-20px,25px)}}

.container{position:relative;z-index:1;max-width:900px;margin:0 auto;padding:24px 20px}

/* Header */
header{display:flex;align-items:center;justify-content:space-between;margin-bottom:32px;flex-wrap:wrap;gap:12px}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,#7c6ef7,#f06292);display:flex;align-items:center;justify-content:center}
.logo-text{font-size:22px;font-weight:800;background:linear-gradient(135deg,#7c6ef7,#f06292);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.status-badge{display:flex;align-items:center;gap:8px;background:rgba(77,208,225,0.1);border:1px solid rgba(77,208,225,0.3);border-radius:50px;padding:8px 16px;font-size:13px;font-family:'Space Mono',monospace;color:#4dd0e1}
.dot{width:8px;height:8px;border-radius:50%;background:#4dd0e1;animation:pulse-dot 2s ease-in-out infinite;flex-shrink:0}
@keyframes pulse-dot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.4;transform:scale(0.8)}}

/* Carte */
.map-wrapper{border-radius:20px;overflow:hidden;border:1px solid var(--card-border);position:relative;margin-bottom:24px;box-shadow:0 0 40px rgba(124,110,247,0.15)}
#map{height:380px;width:100%}
.map-overlay{position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;border-radius:20px;box-shadow:inset 0 0 60px rgba(8,11,20,0.5)}
.map-label{position:absolute;top:16px;left:16px;background:rgba(8,11,20,0.85);border:1px solid var(--card-border);border-radius:10px;padding:8px 14px;font-size:12px;font-family:'Space Mono',monospace;color:var(--neon);backdrop-filter:blur(10px);z-index:500}

/* Cards */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:24px}
.card{background:var(--card-bg);border:1px solid var(--card-border);border-radius:16px;padding:20px;transition:all 0.3s ease;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(124,110,247,0.06),transparent);border-radius:16px;opacity:0;transition:opacity 0.3s}
.card:hover::before{opacity:1}
.card:hover{border-color:rgba(124,110,247,0.4);transform:translateY(-2px)}
.card-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;margin-bottom:12px}
.card-icon.purple{background:rgba(124,110,247,0.15);color:#7c6ef7}
.card-icon.pink{background:rgba(240,98,146,0.15);color:#f06292}
.card-icon.teal{background:rgba(77,208,225,0.15);color:#4dd0e1}
.card-icon.amber{background:rgba(255,183,77,0.15);color:#ffb74d}
.card-label{font-size:11px;font-family:'Space Mono',monospace;color:rgba(232,234,246,0.4);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.card-value{font-size:18px;font-weight:700;color:#e8eaf6;font-family:'Space Mono',monospace}
.card-value.loading{color:rgba(232,234,246,0.2)}

/* Boutons */
.actions{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px}
.btn{border:none;border-radius:16px;padding:18px 24px;font-family:'Syne',sans-serif;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:all 0.3s ease;position:relative;overflow:hidden}
.btn-primary{background:linear-gradient(135deg,#7c6ef7,#9c6ef7);color:#fff}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(124,110,247,0.4)}
.btn-primary:active{transform:scale(0.98)}
.btn-danger{background:rgba(240,98,146,0.12);border:1px solid rgba(240,98,146,0.3);color:#f06292}
.btn-danger:hover{background:rgba(240,98,146,0.2);transform:translateY(-2px);box-shadow:0 8px 30px rgba(240,98,146,0.2)}
.btn-danger.ringing{animation:ring-pulse 0.6s ease-in-out infinite alternate}
@keyframes ring-pulse{0%{box-shadow:0 0 0 0 rgba(240,98,146,0.6)}100%{box-shadow:0 0 0 14px rgba(240,98,146,0)}}

/* Historique */
.history-section{background:var(--card-bg);border:1px solid var(--card-border);border-radius:20px;padding:20px;margin-bottom:24px}
.section-title{font-size:13px;font-weight:700;color:rgba(232,234,246,0.5);text-transform:uppercase;letter-spacing:2px;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.history-item{display:flex;align-items:center;gap:14px;padding:12px 0;border-bottom:1px solid rgba(255,255,255,0.05)}
.history-item:last-child{border-bottom:none}
.history-dot{width:10px;height:10px;border-radius:50%;background:var(--neon);box-shadow:0 0 8px var(--neon);flex-shrink:0}
.history-dot.old{background:rgba(232,234,246,0.2);box-shadow:none}
.history-coords{font-family:'Space Mono',monospace;font-size:12px;color:#e8eaf6;flex:1}
.history-time{font-size:11px;color:rgba(232,234,246,0.3);font-family:'Space Mono',monospace}

/* Partage */
.share-section{background:var(--card-bg);border:1px solid var(--card-border);border-radius:20px;padding:20px}
.share-box{display:flex;gap:10px;margin-top:12px}
.share-input{flex:1;background:rgba(255,255,255,0.05);border:1px solid rgba(124,110,247,0.2);border-radius:10px;padding:12px 16px;font-family:'Space Mono',monospace;font-size:12px;color:#e8eaf6;outline:none}
.share-input::placeholder{color:rgba(232,234,246,0.2)}
.btn-copy{background:rgba(124,110,247,0.15);border:1px solid rgba(124,110,247,0.3);border-radius:10px;padding:12px 16px;color:#7c6ef7;cursor:pointer;font-size:16px;transition:all 0.2s;display:flex;align-items:center;gap:6px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700}
.btn-copy:hover{background:rgba(124,110,247,0.25)}

/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);background:rgba(20,24,40,0.97);border:1px solid var(--card-border);border-radius:14px;padding:14px 24px;font-size:14px;font-family:'Space Mono',monospace;color:var(--neon3);backdrop-filter:blur(20px);z-index:9999;transition:transform 0.4s cubic-bezier(0.34,1.56,0.64,1);display:flex;align-items:center;gap:10px;box-shadow:0 20px 60px rgba(0,0,0,0.5);white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}

/* Carte dark */
.leaflet-tile-pane{filter:invert(1) hue-rotate(180deg) brightness(0.85) saturate(0.8)}
.leaflet-container{background:#0d1117}

/* Responsive */
@media(max-width:500px){
  .actions{grid-template-columns:1fr}
  .cards-grid{grid-template-columns:1fr 1fr}
  header{flex-direction:column;align-items:flex-start}
}
</style>
</head>
<body>

<div class="bg-orbs">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
</div>

<div class="container">

  <header>
    <div class="logo">
      <div class="logo-icon">
        <i class="ti ti-antenna" style="color:#fff;font-size:20px"></i>
      </div>
      <span class="logo-text">TrackWave</span>
    </div>
    <div class="status-badge" id="statusBadge">
      <div class="dot"></div>
      <span id="statusText">En attente...</span>
    </div>
  </header>

  <!-- Carte -->
  <div class="map-wrapper">
    <div id="map"></div>
    <div class="map-overlay"></div>
    <div class="map-label">
      <i class="ti ti-map-pin" style="vertical-align:-2px;margin-right:6px"></i>
      <span id="mapLabel">Localisation en cours...</span>
    </div>
  </div>

  <!-- Infos GPS -->
  <div class="cards-grid">
    <div class="card">
      <div class="card-icon purple"><i class="ti ti-location"></i></div>
      <div class="card-label">Latitude</div>
      <div class="card-value loading" id="latVal">--°</div>
    </div>
    <div class="card">
      <div class="card-icon teal"><i class="ti ti-location"></i></div>
      <div class="card-label">Longitude</div>
      <div class="card-value loading" id="lonVal">--°</div>
    </div>
    <div class="card">
      <div class="card-icon pink"><i class="ti ti-target-arrow"></i></div>
      <div class="card-label">Précision</div>
      <div class="card-value loading" id="accVal">-- m</div>
    </div>
    <div class="card">
      <div class="card-icon amber"><i class="ti ti-clock"></i></div>
      <div class="card-label">Mis à jour</div>
      <div class="card-value loading" id="timeVal">--:--</div>
    </div>
  </div>

  <!-- Actions -->
  <div class="actions">
    <button class="btn btn-primary" onclick="locateMe()">
      <i class="ti ti-refresh" style="font-size:18px"></i>
      Actualiser
    </button>
    <button class="btn btn-danger" id="ringBtn" onclick="toggleRing()">
      <i class="ti ti-volume" style="font-size:18px" id="ringIcon"></i>
      <span id="ringText">Faire Sonner</span>
    </button>
  </div>

  <!-- Historique -->
  <div class="history-section">
    <div class="section-title">
      <i class="ti ti-history" style="font-size:16px;color:var(--neon)"></i>
      Historique des positions
    </div>
    <div id="historyList">
      <div style="text-align:center;padding:20px;font-size:13px;color:rgba(232,234,246,0.25);font-family:'Space Mono',monospace">
        Aucune position enregistrée
      </div>
    </div>
  </div>

  <!-- Partage de position -->
  <div class="share-section">
    <div class="section-title">
      <i class="ti ti-share" style="font-size:16px;color:var(--neon2)"></i>
      Partager ma position
    </div>
    <div class="share-box">
      <input class="share-input" id="shareInput" placeholder="Clique sur Actualiser d'abord..." readonly>
      <button class="btn-copy" onclick="copyShare()">
        <i class="ti ti-copy" style="font-size:15px"></i>
        Copier
      </button>
    </div>
  </div>

</div>

<!-- Toast -->
<div class="toast" id="toast">
  <i class="ti ti-check" style="font-size:16px"></i>
  <span id="toastMsg">Position enregistrée</span>
</div>

<script>
// Initialisation carte
const map = L.map('map', {zoomControl: false, attributionControl: false}).setView([14.6928, 17.4467], 5);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {maxZoom: 19}).addTo(map);
L.control.zoom({position: 'bottomright'}).addTo(map);

let marker = null;
let circle = null;
let isRinging = false;
let audioCtx = null;
let history = [];
let currentLat = null;
let currentLon = null;

const customIcon = L.divIcon({
  html: `<div style="width:16px;height:16px;background:#7c6ef7;border-radius:50%;border:3px solid #fff;box-shadow:0 0 0 4px rgba(124,110,247,0.3)"></div>`,
  className: '',
  iconSize: [16, 16],
  iconAnchor: [8, 8]
});

function showToast(msg, color) {
  const t = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = msg;
  t.style.color = color || '#4dd0e1';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

function updateCards(lat, lon, acc) {
  document.getElementById('latVal').textContent = lat.toFixed(5) + '°';
  document.getElementById('lonVal').textContent = lon.toFixed(5) + '°';
  document.getElementById('accVal').textContent = Math.round(acc) + ' m';
  const now = new Date();
  const h = now.getHours().toString().padStart(2, '0');
  const m = now.getMinutes().toString().padStart(2, '0');
  document.getElementById('timeVal').textContent = h + ':' + m;
  ['latVal', 'lonVal', 'accVal', 'timeVal'].forEach(id => {
    document.getElementById(id).classList.remove('loading');
  });
}

function addHistory(lat, lon) {
  const now = new Date();
  const time = now.getHours().toString().padStart(2, '0') + ':' +
               now.getMinutes().toString().padStart(2, '0') + ':' +
               now.getSeconds().toString().padStart(2, '0');
  history.unshift({lat, lon, time});
  if (history.length > 5) history.pop();

  const list = document.getElementById('historyList');
  list.innerHTML = history.map((h, i) => `
    <div class="history-item">
      <div class="history-dot ${i > 0 ? 'old' : ''}"></div>
      <div class="history-coords">${h.lat.toFixed(4)}° / ${h.lon.toFixed(4)}°</div>
      <div class="history-time">${h.time}</div>
    </div>
  `).join('');
}

function updateShareLink(lat, lon) {
  const url = `https://www.openstreetmap.org/?mlat=${lat}&mlon=${lon}&zoom=16`;
  document.getElementById('shareInput').value = url;
}

function copyShare() {
  const input = document.getElementById('shareInput');
  if (!input.value || input.value === '') {
    showToast('Localise-toi d\'abord !', '#f06292');
    return;
  }
  navigator.clipboard.writeText(input.value)
    .then(() => showToast('✓ Lien copié !'))
    .catch(() => {
      input.select();
      document.execCommand('copy');
      showToast('✓ Lien copié !');
    });
}

function locateMe() {
  document.getElementById('statusText').textContent = 'Localisation...';
  document.getElementById('mapLabel').textContent = 'Signal GPS en cours...';

  if (!navigator.geolocation) {
    showToast('GPS non disponible sur ce navigateur', '#f06292');
    return;
  }

  navigator.geolocation.getCurrentPosition(
    pos => {
      const {latitude: lat, longitude: lon, accuracy: acc} = pos.coords;
      currentLat = lat;
      currentLon = lon;

      map.setView([lat, lon], 15, {animate: true});

      if (marker) map.removeLayer(marker);
      if (circle) map.removeLayer(circle);

      circle = L.circle([lat, lon], {
        radius: acc,
        color: '#7c6ef7',
        fillColor: '#7c6ef7',
        fillOpacity: 0.08,
        weight: 1
      }).addTo(map);

      marker = L.marker([lat, lon], {icon: customIcon}).addTo(map);

      updateCards(lat, lon, acc);
      addHistory(lat, lon);
      updateShareLink(lat, lon);

      document.getElementById('statusText').textContent = 'Signal actif';
      document.getElementById('mapLabel').textContent = 'Position détectée';
      showToast('✓ Position mise à jour');
    },
    err => {
      document.getElementById('statusText').textContent = 'Erreur GPS';
      document.getElementById('mapLabel').textContent = 'Accès refusé';
      showToast('Accès à la position refusé', '#f06292');
    },
    {enableHighAccuracy: true, timeout: 10000}
  );
}

function toggleRing() {
  if (!isRinging) {
    startRing();
  } else {
    stopRing();
  }
}

function startRing() {
  isRinging = true;
  const btn = document.getElementById('ringBtn');
  document.getElementById('ringText').textContent = 'Arrêter';
  document.getElementById('ringIcon').className = 'ti ti-volume-off';
  btn.classList.add('ringing');

  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const notes = [880, 1100, 880, 1320, 1100, 880];
    let i = 0;

    function playNote() {
      if (!isRinging) return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.frequency.setValueAtTime(notes[i % notes.length], audioCtx.currentTime);
      osc.type = 'sine';
      gain.gain.setValueAtTime(0.35, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.3);
      i++;
      if (isRinging) setTimeout(playNote, 350);
    }

    playNote();
    showToast('🔔 Alarme activée', '#f06292');
  } catch (e) {
    showToast('Audio non disponible sur ce navigateur', '#f06292');
  }
}

function stopRing() {
  isRinging = false;
  const btn = document.getElementById('ringBtn');
  document.getElementById('ringText').textContent = 'Faire Sonner';
  document.getElementById('ringIcon').className = 'ti ti-volume';
  btn.classList.remove('ringing');
  if (audioCtx) {
    audioCtx.close();
    audioCtx = null;
  }
  showToast('Alarme arrêtée');
}

// Lancer la localisation au démarrage
locateMe();
</script>
</body>
</html>
